<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqib Ali Traders | Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #ffffff; color: #111827; overflow-x: hidden; }

        /* --- ❄️ SNOWFALL ANIMATION --- */
        .snowflakes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .snowflake { position: absolute; color: white; user-select: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        /* --- UI COMPONENTS --- */
        .top-sale-banner { background: linear-gradient(90deg, #b91c1c, #dc2626); color: white; text-align: center; padding: 10px; font-size: 0.85rem; font-weight: 700; }
        .main-navbar { background-color: #000000; color: white; padding: 20px 40px; text-align: center; }
        .catalog-container { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; transition: 0.3s; }
        .product-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 250px; object-fit: contain; margin-bottom: 15px; }
        .product-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .price-new { font-size: 1.2rem; font-weight: 800; color: #000; margin: 10px 0; display: block; }
        .btn-shop-now { display: block; background: #25d366; color: white; padding: 12px; text-decoration: none; border-radius: 5px; font-weight: 700; cursor: pointer; border: none; width: 100%; }
    </style>
</head>
<body>

    <div class="snowflakes" id="snowflakes"></div>

    <div class="top-sale-banner">WINTER SALE IS LIVE - LIMITED STOCK AVAILABLE!</div>

    <nav class="main-navbar">
        <h1>AQIB ALI TRADERS</h1>
    </nav>

    <main class="catalog-container">
        <div class="product-grid" id="productGrid">
            <!-- Products will be generated by JS -->
        </div>
    </main>

    <script>
        const products = [
            { name: "Lotus Classic", price: "Rs.2,499", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSvYRFFQe_rEiy21aeKaSE2-ptbznp_nbOyCz8e4Xtl7w&s=10" },
            { name: "Doroly Sleek", price: "Rs.3,199", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSqAX_2nViNAfLWNJWLNWXVhJeN8wyW5gaU0DtxaNu2Ag&s=10" },
            { name: "Chrono Elegant", price: "Rs.4,850", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQX-IlDJbQQI_u3e_zhiKvJIfa7Z4F2G8YxtuDN3o_2xA&s=10" },
            { name: "Phantom Black", price: "Rs.2,150", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6YY4ViBXNS-O5sBROtst-rMNUJhg9Gyitt4uhGOy_cQ&s" },
            { name: "Royal Gold", price: "Rs.3,799", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRTwAwPOcqBiR9rYBRR27xI4sk0bvndc2CQj0OMg_IPg&s=10" },
            { name: "Legacy Leather", price: "Rs.2,890", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRg1n0BGSUheNUskbmzD4Ecmv4p7qpAMbLM1qqujw8HNw&s=10" },
            { name: "Prestige Silver", price: "Rs.4,200", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS18QhuiSSxBzmy-m-nwVzUj1qk21dhBh1HAcgPeQoldg&s=10" },
            { name: "Vanguard Edition", price: "Rs.2,650", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ-YlkT2VL0hcWi99eANSxmi4zSPckfRxSQE70vEYVRew&s=10" }
        ];

        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3 class="product-name">${p.name}</h3>
                    <span class="price-new">${p.price}</span>
                    <button class="btn-shop-now" onclick="window.open('https://wa.me/923080552133?text=Assalam-o-Alaikum, I want to buy ${p.name} for ${p.price}')">SHOP ON WHATSAPP</button>
                </div>
            `;
        });

        // Snowfall Function
        function createSnow() {
            const container = document.getElementById('snowflakes');
            const icons = ['❄', '❅', '❆'];
            for (let i = 0; i < 40; i++) {
                const s = document.createElement('div');
                s.className = 'snowflake';
                s.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDuration = Math.random() * 5 + 7 + 's';
                s.style.fontSize = (Math.random() * 15 + 10) + 'px';
                container.appendChild(s);
            }
        }
        createSnow();
    </script>
</body>
</html>
