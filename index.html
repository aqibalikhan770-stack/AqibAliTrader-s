<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Basic Setup */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fff; }

        /* 1. Top Banner */
        .top-banner { background: #b91c1c; color: white; text-align: center; padding: 10px; font-size: 0.8rem; }

        /* 2. Slider */
        .hero-slider { width: 100%; height: 400px; background: #000; display: flex; align-items: center; justify-content: center; color: white; }

        /* 3. Category Circles */
        .categories { display: flex; justify-content: center; gap: 30px; padding: 40px; }
        .cat-item { text-align: center; }
        .cat-item img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #ddd; }

        /* 4. Product Grid */
        .products { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 40px; }
        .card { border: 1px solid #eee; padding: 15px; text-align: center; }
        .card img { width: 100%; }
        .quick-buy { background: #000; color: #fff; padding: 10px; cursor: pointer; border: none; width: 100%; margin-top: 10px; }

        /* 5. Footer */
        .footer { background: #f9f9f9; padding: 40px; display: flex; justify-content: space-around; }
    </style>
</head>
<body>

    <!-- Banner -->
    <div class="top-banner">SALE 2 : 14 : 35 : 07 LIVE | Upto 40% OFF</div>

    <!-- Hero Section -->
    <div class="hero-slider"><h1>OWN YOUR TIME</h1></div>

    <!-- Categories -->
    <div class="categories">
        <div class="cat-item"><img src="watch1.jpg"> <p>Men Sports</p></div>
        <div class="cat-item"><img src="watch2.jpg"> <p>Smart Watches</p></div>
        <div class="cat-item"><img src="watch3.jpg"> <p>Couple Watches</p></div>
    </div>

    <!-- Product Grid -->
    <div class="products">
        <div class="card">
            <img src="product1.jpg">
            <h3>Wyndow</h3>
            <p>Rs.14,999</p>
            <button class="quick-buy">Quick Buy</button>
        </div>
        <!-- Add more cards here -->
    </div>

    <div class="footer">
        <div><h4>SHOP SVESTON</h4><p>Own Your Time</p></div>
        <div><h4>CUSTOMER CARE</h4><p>Contact Us</p></div>
    </div>

</body>
</html>
